name: Deploy Book to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      # 只有 book 目录或工作流本身变化时才触发构建
      - 'deep-learning/digit_recognizer/book/**'
      - '.github/workflows/deploy-book.yml'
  workflow_dispatch: # 允许手动触发

# 允许 Actions 写入 GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只运行一个部署，取消排队中的旧任务
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build VitePress
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史，用于"最后更新时间"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: deep-learning/digit_recognizer/book/package.json

      - name: Install dependencies
        working-directory: deep-learning/digit_recognizer/book
        run: npm install

      - name: Build VitePress
        working-directory: deep-learning/digit_recognizer/book
        env:
          # 设置 GitHub Pages 的 base 路径（/仓库名/）
          VITEPRESS_BASE: /ai-playground/
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deep-learning/digit_recognizer/book/.vitepress/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
